name: CI

on:
  push:
    branches: [main, "dev/**"]
  pull_request:
    branches: [main, "dev/**"]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-${{ matrix.os }}-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: zig-${{ matrix.os }}-

      - name: Check formatting
        run: zig fmt --check src/ edge/ build.zig

      - name: Build (default)
        run: zig build

      - name: Run tests
        run: zig build test --summary all

      - name: Build WASM edge harness
        run: zig build wasm

      - name: Build migration tool
        run: zig build migrate

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install edge/ JS dependencies
        run: bun install

      - name: Run hermetic TS unit tests (edge/persistence.ts, edge/routes.ts)
        run: bun test edge/persistence.test.ts edge/worker.test.ts

  integration:
    name: Integration tests (Postgres 17)
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: atomik_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ATOMIK_DATABASE_URL: postgres://postgres:postgres@localhost:5432/atomik_test

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-integration-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: zig-integration-

      - name: Install libpq
        run: sudo apt-get install -y libpq-dev postgresql-client

      - name: Run integration tests
        run: zig build test-integration --summary all

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install edge/ JS dependencies
        run: bun install

      - name: Apply schema for TS persistence integration tests
        run: psql "$ATOMIK_DATABASE_URL" -f init.sql

      - name: Run TS persistence integration tests (edge/persistence.ts against live Postgres)
        run: bun test edge/persistence.integration.test.ts
